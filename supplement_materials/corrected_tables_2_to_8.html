function fm(m,s){return s===0?m.toFixed(5):m.toFixed(5)+' ± '+s.toFixed(5)}
function fk(v){return v.toFixed(5)}
function delta(e,n,idx){
  const d=(e[idx]-n[idx]);
  const cls=Math.abs(d)<0.001?'zero':d>0?'pos':'neg';
  const sign=d>0?'+':'';
  return `<span class="${cls}">${sign}${d.toFixed(5)}</span>`;
}

function buildTable(tname, tdata){
  const eda=tdata.eda, noeda=tdata.noeda;
  const bestEDA=eda.reduce((b,r)=>r[2]>b[2]?r:b,eda[0])[0];
  const bestNOEDA=noeda.reduce((b,r)=>r[2]>b[2]?r:b,noeda[0])[0];

  let h=`<h2>${tname}</h2>
  <p class="subtitle">Mean ± std over 5 independent runs. Best OA per condition highlighted.</p>`;

  // EDA table
  h+=`<div class="section-label">With EDA</div>
  <table><thead><tr>
    <th style="width:14%">Technique</th>
    <th style="width:16%">Configuration</th>
    <th style="width:22%">OA (%)</th>
    <th style="width:18%">Kappa</th>
    <th style="width:22%">F1 (%)</th>
    <th style="width:8%">Runs</th>
  </tr></thead><tbody>`;
  for(const r of eda){
    const best=r[0]===bestEDA;
    h+=`<tr${best?' class="best"':''}>
      <td>${r[0]}</td><td>${r[1]}</td>
      <td>${fm(r[2],r[3])}</td>
      <td>${fm(r[4],r[5])}</td>
      <td>${fm(r[6],r[7])}</td>
      <td>${r[8]}</td>
    </tr>`;
  }
  h+=`</tbody></table>`;

  // NoEDA table with delta
  h+=`<div class="section-label" style="margin-top:12px">Without EDA &amp; Delta (EDA − No-EDA)</div>
  <table><thead><tr>
    <th style="width:14%">Technique</th>
    <th style="width:16%">Configuration</th>
    <th style="width:22%">OA (%)</th>
    <th style="width:14%">Kappa</th>
    <th style="width:18%">F1 (%)</th>
    <th style="width:16%">ΔOA / ΔKappa / ΔF1</th>
  </tr></thead><tbody>`;
  for(let i=0;i<noeda.length;i++){
    const r=noeda[i];const e=eda[i];
    const best=r[0]===bestNOEDA;
    const doa=delta(e,r,2),dk=delta(e,r,4),df=delta(e,r,6);
    h+=`<tr${best?' class="best"':''}>
      <td>${r[0]}</td><td>${r[1]}</td>
      <td>${fm(r[2],r[3])}</td>
      <td>${fm(r[4],r[5])}</td>
      <td>${fm(r[6],r[7])}</td>
      <td>${doa} / ${dk} / ${df}</td>
    </tr>`;
  }
  h+=`</tbody></table>`;
  return h;
}

function buildT8(){
  let h=`<h2>Table 8: Cross-Dataset Aggregated</h2>
  <p class="subtitle">Per-dataset best-config OA/Kappa/F1 averaged across all 6 datasets. Mean ± std over those 6 per-dataset values.</p>`;

  for(const [label,rows] of [['With EDA',T8.eda],['Without EDA',T8.noeda]]){
    const bestOA=rows.reduce((b,r)=>r[1]>b[1]?r:b,rows[0])[0];
    h+=`<div class="section-label" style="margin-top:${label==='Without EDA'?'12px':'0'}">${label}</div>
    <table><thead><tr>
      <th style="width:16%">Technique</th>
      <th style="width:28%">OA (%) across datasets</th>
      <th style="width:28%">Kappa</th>
      <th style="width:28%">F1 (%)</th>
    </tr></thead><tbody>`;
    for(const r of rows){
      const best=r[0]===bestOA;
      h+=`<tr${best?' class="best"':''}>
        <td>${r[0]}</td>
        <td>${fm(r[1],r[2])}</td>
        <td>${fm(r[3],r[4])}</td>
        <td>${fm(r[5],r[6])}</td>
      </tr>`;
    }
    h+=`</tbody></table>`;
  }
  return h;
}

});
